# Constructor Studio project configuration

version = "1.0"
project_root = ".."

[install]
version_source = "project_config"
runtime_tracking = "ignored"
agent_tracking = "ignored"
kit_tracking = "tracked"

[kits]
[kits.sdlc]
format = "CFS"
path = "config/kits/sdlc"
source = "github:constructorfabric/studio-kit-sdlc"
install_mode = "copy"
version = "v1.2.1"

[kits.sdlc.source_provenance]
source_type = "github"
resolver_mode = "latest_release"
resolution_basis = "github_release"
requested_ref = "latest"
resolved_ref = "v1.2.1"
commit_sha = "4318126"
canonical_source = "github:constructorfabric/studio-kit-sdlc"
effective_source = "github:constructorfabric/studio-kit-sdlc"
verified = "verified"
freshness = "fresh"

[kits.sdlc.local_metadata]
conf_version = "1.0.0"

[kits.sdlc.resources]
[kits.sdlc.resources.adr_template]
path = "config/kits/sdlc/artifacts/ADR/template.md"
kind = "template"
public = false
description = "ADR artifact template"

[kits.sdlc.resources.adr_rules]
path = "config/kits/sdlc/artifacts/ADR/rules.md"
kind = "other"
public = false
