[whatsnew."v1.1.0"]
summary = "Constructor Studio v1.1.0"
details = "This release makes Constructor Studio easier to install, repair, and keep in a normal project repository.\r\n\r\n  ## What’s New\r\n\r\n  ### Cleaner project setup\r\n\r\n  `cfs init` now keeps generated Studio files out of git by default.\r\n\r\n  Constructor Studio runtime files and generated agent integration files are treated as local generated files, so your repository stays focused on the files\r\n  you actually edit.\r\n\r\n  ### Easier install choices\r\n\r\n  During `cfs init`, Constructor Studio now shows installation options before setup and lets you change them interactively.\r\n\r\n  You can choose where Studio is installed, how generated files are handled, and whether each kit should be tracked in git or treated as generated content.\r\n\r\n  ### Per-kit tracking\r\n\r\n  Kit tracking is now configured per kit.\r\n\r\n  This means one kit can be tracked in git while another kit is ignored and regenerated by Studio. For example, you can track custom editable kits while\r\n  keeping the default SDLC kit out of git.\r\n\r\n  ### Safer updates\r\n\r\n  `cfs update` no longer updates kit files by default.\r\n\r\n  This avoids unexpected changes to editable kit content. To update kits as part of an update, explicitly opt in:\r\n\r\n```bash\r\n  cfs update --with-kits yes\r\n```\r\n\r\n  ### Repair without upgrading\r\n\r\n  Running cfs init in an already initialized project now repairs the existing Studio setup instead of silently upgrading it.\r\n\r\n  It restores generated runtime files and agent integration files using the Studio version already pinned in the project.\r\n\r\n  ### Better kit installation flow\r\n\r\n  When installing a kit, Constructor Studio now shows where files will be written before copying them.\r\n\r\n  Editable paths can be changed through a numbered menu. Locked paths are still shown in the plan, but are not offered for editing.\r\n\r\n  ### More useful version output\r\n\r\n  cfs --version now includes information about the local Studio cache, including where it came from and which version/ref it represents.\r\n\r\n  ## Upgrade Notes\r\n\r\n  After upgrading, run:\r\n\r\n  cfs init\r\n\r\n  inside an existing Studio project to repair generated files using the project’s pinned Studio version.\r\n\r\n  If you want kit files updated too, run:\r\n\r\n  cfs update --with-kits yes"

